<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WB ASIN Matcher</title>
  <style>
    body { font-family: Arial, sans-serif; width: 320px; margin: 10px; }
    #asin-results { list-style: none; padding: 0; margin: 8px 0 0; max-height: 220px; overflow: auto; }
    .result-item { width: 100%; text-align: left; font-size: 12px; margin-bottom: 4px; }
    .actions { display:flex; gap:8px; margin-top:8px; }
  </style>
</head>
<body>
  <h3>WB ⇄ Amazon</h3>
  <div>Imported Amazon products: <span id="amazon-count">0</span></div>
  <div>Active ASIN: <span id="active-asin">—</span></div>
  <div style="margin-top:8px;">
    Overlay position:
    <select id="overlay-position">
      <option value="top-left">Top-left</option>
      <option value="top-right">Top-right</option>
      <option value="bottom-left">Bottom-left</option>
      <option value="bottom-right">Bottom-right</option>
      <option value="auto">Auto</option>
    </select>
  </div>
  <div style="margin-top:8px;">
    X offset: <input id="card-offset-x" type="number" min="0" max="36" value="8" style="width:64px" />
    Y offset: <input id="card-offset-y" type="number" min="0" max="36" value="8" style="width:64px" />
  </div>
  <div style="margin-top:8px;">
    <label><input id="prefer-above-overlays" type="checkbox" checked /> Prefer above other overlays</label>
  </div>
  <div style="margin-top:8px;">
    Default link type:
    <select id="default-link-type"></select>
  </div>
  <div class="actions">
    <button id="force-scan-btn" type="button">Force scan current tab</button>
    <span id="scan-status"></span>
  </div>
  <input id="asin-search" placeholder="Search ASIN/title/brand" style="width:100%;margin-top:8px" />
  <ul id="asin-results"></ul>
  <script type="module" src="src/popup/index.js"></script>
</body>
</html>
